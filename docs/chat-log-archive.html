<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Log Archive</title>
<style>
:root {
  --bg: #1e1e1e;
  --surface: #252526;
  --border: #333;
  --text: #ccc;
  --text-dim: #888;
  --accent: #58a6ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 14px;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}
.top-bar {
  padding: 16px 24px 0;
  flex-shrink: 0;
}
h1 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 4px;
  color: #e0e0e0;
}
.subtitle {
  color: var(--text-dim);
  font-size: 12px;
  margin-bottom: 12px;
}
.folder-link {
  color: var(--accent);
  cursor: pointer;
  text-decoration: underline;
}
.folder-link:hover { color: #79b8ff; }
.search-bar {
  width: 100%;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  margin-bottom: 12px;
  outline: none;
}
.search-bar:focus { border-color: var(--accent); }
.search-bar::placeholder { color: #666; }

.content { display: flex; flex: 1; overflow: hidden; }

/* Left panel — log list */
.list-panel {
  width: 380px;
  min-width: 280px;
  overflow-y: auto;
  padding: 0 16px 16px 24px;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}
.list-panel::-webkit-scrollbar { width: 6px; }
.list-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.server-group { margin-bottom: 16px; }
.server-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  cursor: pointer;
  user-select: none;
}
.server-header:hover { color: var(--accent); }
.server-name {
  font-size: 14px;
  font-weight: 600;
}
.server-count {
  font-size: 11px;
  color: var(--text-dim);
  background: var(--surface);
  padding: 1px 7px;
  border-radius: 8px;
}
.server-arrow {
  font-size: 10px;
  color: var(--text-dim);
  transition: transform 0.15s;
}
.server-group.collapsed .server-arrow { transform: rotate(-90deg); }
.server-group.collapsed .log-list { display: none; }

.log-list { padding-left: 4px; }

.log-entry {
  display: flex;
  align-items: center;
  padding: 5px 8px;
  border-radius: 4px;
  cursor: pointer;
  gap: 10px;
  font-size: 12px;
}
.log-entry:hover { background: rgba(255,255,255,.05); }
.log-entry.active { background: rgba(88,166,255,.15); }
.log-date {
  color: var(--accent);
  font-weight: 500;
  min-width: 82px;
}
.log-room {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.log-room-id {
  color: var(--text-dim);
  font-size: 11px;
}
.log-size {
  color: var(--text-dim);
  font-size: 11px;
  min-width: 55px;
  text-align: right;
}

/* Right panel — log viewer */
.viewer-panel {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px;
}
.viewer-panel::-webkit-scrollbar { width: 6px; }
.viewer-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.viewer-empty {
  color: var(--text-dim);
  text-align: center;
  padding-top: 80px;
  font-size: 13px;
}
.viewer-header {
  font-size: 13px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
  margin-bottom: 12px;
}
.viewer-header strong { color: var(--text); }
.viewer-content {
  user-select: text;
}
/* Inline styles from streamed log files — override to match */
.viewer-content .userlogchat { padding: 2px 0 2px 4px; font-size: 90%; }
.viewer-content .userlogchat:hover { background-color: rgba(255,255,255,.05); }
.viewer-content .userlogname { font-weight: bold; display: inline; margin-right: 4px; }
.viewer-content .userlogwhisper { color: #4ec9b0; font-style: italic; }
.viewer-content .userlogtime { color: #7788AA; font-size: small; margin-right: 6px; display: inline; }
.viewer-content .logmsg { color: #7a7a7a; text-indent: 6px; font-size: smaller; }
.viewer-content a { color: #58a6ff; }

.empty-state {
  text-align: center;
  color: var(--text-dim);
  padding: 60px 20px;
  font-size: 14px;
}
</style>
</head>
<body>
<div class="top-bar">
<h1>Chat Log Archive</h1>
<p class="subtitle">Logs are stored in your Documents folder under <span class="folder-link" id="open-folder">PalaceV Chat Logs</span></p>
<input type="text" id="search-box" class="search-bar" placeholder="Search logs..." autocomplete="off" spellcheck="false">
</div>
<div class="content">
<div class="list-panel" id="archive-list"></div>
<div class="viewer-panel" id="viewer">
  <div class="viewer-empty">Select a log to view its contents</div>
</div>
</div>
<script type="module" src="../dist/chat-log-archive.js"></script>
</body>
</html>
